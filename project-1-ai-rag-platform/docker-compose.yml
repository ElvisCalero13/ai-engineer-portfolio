services:
  api:
    build:
      context: ./apps/api
    container_name: project-1-api
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: business_documents
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: project-1-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: